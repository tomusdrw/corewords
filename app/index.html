<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AAC Core Words - Polish</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Baloo+2:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #FAFBFC;
            --bg-secondary: #F0F4F8;
            --accent-primary: #FF6B6B;
            --accent-secondary: #4ECDC4;
            --accent-tertiary: #FFE66D;
            --accent-quaternary: #95E1D3;
            --text-primary: #2C3E50;
            --text-secondary: #5D6D7E;
            --shadow-soft: 0 4px 20px rgba(0,0,0,0.08);
            --shadow-pressed: 0 2px 10px rgba(0,0,0,0.12);
            --radius-lg: 24px;
            --radius-md: 16px;
            --radius-sm: 12px;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #FAFBFC 0%, #EEF2F7 100%);
            min-height: 100vh;
            overflow-x: hidden;
            color: var(--text-primary);
        }

        .app-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            padding: 16px 20px;
            background: white;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-soft);
        }

        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            font-size: 18px;
            font-weight: 600;
        }

        .breadcrumb-item {
            color: var(--text-secondary);
            transition: color 0.2s;
            cursor: pointer;
        }

        .breadcrumb-item:hover {
            color: var(--accent-primary);
        }

        .breadcrumb-item.active {
            color: var(--accent-primary);
            font-weight: 700;
            cursor: default;
        }

        .breadcrumb-separator {
            color: var(--text-secondary);
            opacity: 0.5;
        }

        .back-btn {
            background: var(--bg-secondary);
            border: none;
            padding: 12px 20px;
            border-radius: var(--radius-md);
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            font-size: 16px;
            color: var(--text-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
        }

        .back-btn:hover {
            background: var(--accent-quaternary);
            transform: translateY(-2px);
        }

        .back-btn:active {
            transform: translateY(0);
        }

        /* Grid */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 16px;
            flex: 1;
            align-content: start;
        }

        /* Grid Item */
        .grid-item {
            background: white;
            border-radius: var(--radius-lg);
            padding: 16px 12px;
            text-align: center;
            cursor: pointer;
            box-shadow: var(--shadow-soft);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 3px solid transparent;
        }

        .grid-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: transparent;
            transition: background 0.3s;
        }

        .grid-item:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
        }

        .grid-item:active {
            transform: translateY(-2px) scale(0.98);
            box-shadow: var(--shadow-pressed);
        }

        .grid-item.category::before {
            background: var(--accent-secondary);
        }

        .grid-item.word::before {
            background: var(--accent-primary);
        }

        .grid-item-text {
            font-family: 'Baloo 2', cursive;
            font-size: 32px;
            font-weight: 600;
            color: var(--text-primary);
            line-height: 1.2;
            word-break: break-word;
        }



        .grid-item-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .grid-item-badge.category {
            background: var(--accent-secondary);
            color: white;
        }

        .grid-item-badge.word {
            background: var(--accent-primary);
            color: white;
        }

        /* Loading & Empty States */
        .center-message {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            gap: 20px;
            color: var(--text-secondary);
            text-align: center;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid var(--bg-secondary);
            border-top-color: var(--accent-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }



        /* Speaking Indicator */
        .speaking-indicator {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: var(--accent-primary);
            color: white;
            padding: 12px 20px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 14px;
            box-shadow: 0 4px 20px rgba(255, 107, 107, 0.4);
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 10px;
            pointer-events: none;
        }

        .speaking-indicator.visible {
            opacity: 1;
        }

        .speaking-indicator .pulse {
            width: 10px;
            height: 10px;
            background: white;
            border-radius: 50%;
            animation: pulse 1s ease infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
        }

        @media (max-width: 480px) {
            .app-container { padding: 12px; }
            .header { padding: 12px 16px; margin-bottom: 16px; }
            .grid-container { grid-template-columns: repeat(2, 1fr); gap: 12px; }
            .grid-item { min-height: 100px; padding: 20px 12px; }
            .grid-item-text { font-size: 24px; }
        }
        
        @media (min-width: 768px) {
            .grid-container {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
                gap: 20px;
            }
        }
    </style>
</head>
<body>
    <div id="app"></div>
    <script type="module" src="app.js"></script>
</body>
</html>
